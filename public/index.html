
<!DOCTYPE html>
<html lang="ko">
  <head>
    <!--RUNTIME_API_BASE-->  
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>정동병원 메신저</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="정동병원 메신저" />
    
    <!-- App Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: contain;
      }
      
      #root {
        width: 100%;
        height: 100%;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Firebase SDK (호환성 라이브러리) -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-messaging-compat.js"></script>
    
    <!-- Firebase 초기화 및 FCM 토큰 획득 -->
    <script>
      // Firebase 설정
      const firebaseConfig = {
        apiKey: "AIzaSyBAnYrnLNk6WoyPdL9iZ_W46J1HWOeNWoM",
        authDomain: "jungdong-48d68.firebaseapp.com",
        databaseURL: "https://jungdong-48d68.firebasedatabase.app",
        projectId: "jungdong-48d68",
        storageBucket: "jungdong-48d68.appspot.com",
        messagingSenderId: "215479265614",
        appId: "1:215479265614:web:d51cc5b797f54731df161f",
      };

      // Firebase 초기화
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
          console.log('✅ Firebase 초기화 완료 (호환성 라이브러리)');
        }
      } catch (error) {
        console.error('❌ Firebase 초기화 실패:', error);
      }

      // Service Worker 등록 및 FCM 토큰 획득
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .register('/firebase-messaging-sw.js', { scope: '/' })
          .then((registration) => {
            console.log('✅ Firebase Messaging Service Worker 등록됨');

            // FCM 메시징 인스턴스 획득
            const messaging = firebase.messaging();

            // 포그라운드 메시지 수신 처리
            messaging.onMessage((payload) => {
              console.log('📬 [포그라운드] 메시지 수신:', payload);

              // 메인 앱에 메시지 전달
              if (window.fcmMessageHandler) {
                window.fcmMessageHandler(payload);
              } else {
                // 브라우저 알림 표시 (백그라운드 처리 불가 시)
                if (Notification.permission === 'granted') {
                  new Notification(
                    payload.notification?.title || '새 메시지',
                    {
                      body: payload.notification?.body || '메시지가 도착했습니다.',
                      icon: '/logo.svg',
                      data: payload.data,
                    }
                  );
                }
              }
            });

            // FCM 토큰 획득 (권한이 있을 때만)
            if (Notification.permission === 'granted') {
              messaging
                .getToken({
                  vapidKey: 'BMhYOY4vS8-KWYs6Tv-KxnariNktTunOlobsSVlAAKZi_Q3-Cdp0JeJMEsZqBhMSib0DsnUE2aFUDTwohM4KXKk',
                })
                .then((token) => {
                  if (token) {
                    window.fcmToken = token;
                    console.log('✅ FCM 토큰 획득 성공:', token.substring(0, 20) + '...');
                  }
                })
                .catch((err) => {
                  console.warn('⚠️ FCM 토큰 획득 실패:', err);
                });
            }
          })
          .catch((error) => {
            console.warn('⚠️ Firebase Messaging Service Worker 등록 실패:', error);
          });
      }
    </script>
  </body>
</html>
